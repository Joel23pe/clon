<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Yango/DiDi Clone - Réplica Exacta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 flex justify-center items-center md:p-4 overflow-hidden">

    <div id="app-shell" class="relative w-full max-w-md h-[100dvh] md:h-[850px] bg-white md:rounded-3xl md:shadow-2xl overflow-hidden flex flex-col">

        <div id="map-container" class="relative flex-1 min-h-0">
            <div id="map"></div>
            <button class="absolute top-4 left-4 bg-white p-3 rounded-full shadow-lg text-gray-700 z-[1000] hover:bg-gray-50">
                <i class="fa-solid fa-bars text-lg"></i>
            </button>
        </div>

        <div id="sheet" class="w-full bg-white rounded-t-3xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] p-5 z-[1000] flex flex-col gap-4 overflow-y-auto flex-shrink-0">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto -mt-2 mb-1"></div>

            <div id="panel-solicitar" class="flex flex-col gap-4">
                <h2 class="text-xl font-bold text-gray-800 tracking-tight">¿A dónde vamos hoy?</h2>

                <div class="relative flex flex-col gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <div class="absolute left-[25px] top-[28px] bottom-[28px] w-0.5 border-l-2 border-dashed border-gray-300"></div>

                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full bg-green-500 z-10 ml-1"></div>
                        <div class="flex-1 min-w-0">
                            <label class="text-[10px] uppercase font-bold text-gray-400 block">Punto de Inicio</label>
                            <input type="text" id="origen" class="w-full bg-transparent text-sm font-semibold text-gray-800 focus:outline-none" value="Av. Eduardo De Habich 136, San Martin de Porres">
                        </div>
                    </div>
                    <hr class="border-gray-200 ml-6">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full bg-orange-500 z-10 ml-1"></div>
                        <div class="flex-1 min-w-0">
                            <label class="text-[10px] uppercase font-bold text-gray-400 block">Destino Final</label>
                            <input type="text" id="destino" class="w-full bg-transparent text-sm font-semibold text-gray-800 focus:outline-none" value="Av. Peru 4344, Callao">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2.5">
                        <label class="text-[10px] uppercase font-bold text-gray-400 block mb-0.5">Fecha</label>
                        <input type="date" id="fecha-viaje" class="w-full bg-transparent text-sm font-bold text-gray-700 focus:outline-none">
                    </div>
                    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2.5">
                        <label class="text-[10px] uppercase font-bold text-gray-400 block mb-0.5">Hora</label>
                        <input type="time" id="hora-viaje" class="w-full bg-transparent text-sm font-bold text-gray-700 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-semibold text-gray-500 block mb-1">Ofrece tu tarifa sugerida</label>
                    <div class="flex items-center bg-gray-50 border border-gray-200 rounded-2xl p-3">
                        <span class="text-lg font-bold text-gray-700 mr-2">S/.</span>
                        <input type="number" id="monto" class="w-full bg-transparent text-lg font-bold text-gray-800 focus:outline-none" value="20">
                        <i class="fa-solid fa-coins text-gray-400"></i>
                    </div>
                </div>

                <button onclick="buscarDireccionesReales()" id="btn-buscar" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg text-base transition-all">
                    Confirmar Solicitud
                </button>
            </div>

            <div id="panel-estado" class="hidden flex-col items-center text-center py-4 gap-4">
                <div id="status-icon" class="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-2xl animate-bounce">
                    <i class="fa-solid fa-spinner animate-spin"></i>
                </div>
                <div>
                    <h3 id="status-title" class="text-lg font-bold text-gray-800">Buscando conductores...</h3>
                    <p id="status-desc" class="text-sm text-gray-500 mt-1">Enviando tu oferta de tarifa...</p>
                </div>
                <div id="driver-info" class="hidden w-full bg-gray-50 border border-gray-100 p-3 rounded-2xl flex items-center justify-between text-left">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center text-slate-600 text-xl font-bold">JP</div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">Juan Pérez</h4>
                            <p class="text-xs text-gray-500">★ 4.9 • Toyota Corolla</p>
                        </div>
                    </div>
                    <span id="monto-final" class="text-lg font-black text-gray-800">S/. 00.00</span>
                </div>
                <button onclick="cancelarViaje()" id="btn-accion" class="w-full bg-red-50 text-red-600 font-bold py-3 rounded-2xl text-sm">
                    Cancelar Solicitud
                </button>
            </div>

            <div id="panel-recibo" class="hidden flex-col gap-4 py-2">
                <div class="flex items-center gap-2 overflow-x-auto pb-1 no-scrollbar">
                    <span class="bg-yango-orange text-yango-orange text-[13px] font-bold px-4 py-1.5 rounded-full tracking-wide whitespace-nowrap">Todo</span>
                    <span class="bg-yango-gray text-gray-800 text-[13px] font-medium px-4 py-1.5 rounded-full whitespace-nowrap">Viaje</span>
                    <span class="bg-yango-gray text-gray-800 text-[13px] font-medium px-4 py-1.5 rounded-full whitespace-nowrap">Comida</span>
                    <span class="bg-yango-gray text-gray-800 text-[13px] font-medium px-4 py-1.5 rounded-full whitespace-nowrap">Entrega</span>

                    <button class="btn-filtro" aria-label="Filtrar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="6" cy="7" r="3" fill="#000000" />
                            <path d="M9 7H20" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
                            <path d="M4 17H15" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="18" cy="17" r="3" fill="#000000" />
                        </svg>
                    </button>
                </div>

                <div class="flex items-start gap-3 pt-4 mt-1">
                    <div class="w-11 h-11 flex-shrink-0 flex items-center justify-center">
                        <img src="carrito.png" alt="Icono servicio" class="w-11 h-11 object-contain">
                    </div>

                    <div class="flex-1 min-w-0 flex flex-col pl-0">
                        <h3 id="recibo-destino-replica" style="margin-bottom: 10px !important; line-height: 1.1 !important;" class="text-[14px] font-bold text-black tracking-tight truncate">Av. Peru 4344, Callao</h3>
                        <p id="recibo-express-linea" style="line-height: 1.1 !important;" class="text-row-muted">Express · Personal · Finalizado</p>
                        <p class="text-row-muted mt-0.5">
                            <span id="recibo-costo-replica">S/ 20.00</span> · <span id="recibo-tiempo-replica">9:11 am</span>
                        </p>
                        <button onclick="regresarAlInicio()" class="mt-4 bg-yango-gray hover:bg-gray-200 text-black font-bold text-[13px] px-5 py-2 rounded-full w-max tracking-wide">
                            Pedir de nvo.
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
